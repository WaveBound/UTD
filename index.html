<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Moved - Universal TD Optimizer</title>
    
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #0f1014;
            border: 1px solid #1f2937;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            max-width: 450px;
            width: 100%;
        }
        h1 {
            margin-top: 0;
            color: #e2e8f0;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.5rem;
        }
        p {
            color: #94a3b8;
            line-height: 1.6;
            margin: 15px 0;
            font-size: 1.05rem;
        }
        .redirect-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: filter 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .redirect-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }
        .bookmark-notice {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Site Has Moved</h1>
        <p>The Universal TD Optimizer has moved to a new domain!</p>
        
        <a href="https://noxith.com/utdx/" class="redirect-btn">Go To New Site</a>

        <div class="bookmark-notice">
            Please remember to update your bookmarks to <b>noxith.com/utdx/</b>
        </div>
    </div>

</body>
</html>
